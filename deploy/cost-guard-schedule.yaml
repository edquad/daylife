AWSTemplateFormatVersion: '2010-09-09'
Description: Rozka cost guard schedule only

Resources:
  BillingCheckRule:
    Type: AWS::Events::Rule
    Properties:
      Name: rozka-cost-guard-check
      Description: Check AWS bill every 6 hours and pause Rozka if over cap
      ScheduleExpression: rate(6 hours)
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:aws:lambda:us-east-1:${AWS::AccountId}:function:rozka-cost-guard'
          Id: CostGuardTarget
          Input: '{"action":"check"}'

  CostGuardInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: rozka-cost-guard
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BillingCheckRule.Arn
