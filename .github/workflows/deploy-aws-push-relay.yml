name: Deploy AWS push relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'aws/**'
      - '.github/workflows/deploy-aws-push-relay.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - uses: aws-actions/setup-sam@v2

      - name: Install Lambda dependencies
        working-directory: aws/push-relay
        run: npm ci || npm install

      - name: Deploy stack
        working-directory: aws
        env:
          VAPID_PRIVATE: ${{ secrets.DAYLIFE_VAPID_PRIVATE_KEY }}
        run: |
          sam build
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "VapidPublicKey=BET8I04xeWID8z61Rv6Mj7n-j7jF1rZgYmSOlLFHaZx9Yw29eiahe7IfAudP6OhbW8DuGhks21Z8j9BcvHHYF5g VapidPrivateKey=${VAPID_PRIVATE}"

      - name: Print relay URL
        working-directory: aws
        run: |
          URL=$(aws cloudformation describe-stacks --stack-name rozka-push-relay \
            --query "Stacks[0].Outputs[?OutputKey=='PushRelayUrl'].OutputValue" --output text)
          echo "Push relay URL: $URL"
          echo "Add GitHub repo variable DAYLIFE_PUSH_RELAY_URL=$URL"
