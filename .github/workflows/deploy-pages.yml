name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: 'true'
          REPO_NAME: ${{ github.event.repository.name }}
          VITE_GITHUB_SYNC_TOKEN: ${{ secrets.DAYLIFE_SYNC_TOKEN }}

      - name: SPA fallback for GitHub Pages routes
        run: cp daylife-ui/dist/index.html daylife-ui/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./daylife-ui/dist
          cname: false
