name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: 'true'
          REPO_NAME: ${{ github.event.repository.name }}
          VITE_GITHUB_SYNC_TOKEN: ${{ secrets.DAYLIFE_SYNC_TOKEN }}

      - name: SPA fallback for GitHub Pages routes
        run: cp daylife-ui/dist/index.html daylife-ui/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: daylife-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
